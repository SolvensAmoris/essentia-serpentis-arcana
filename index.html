<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essentia Serpentis Arcana | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --purple: #4A0E8F; --blood: #8B0000; --gold: #C9A84C; --cream: #F0E6D3; }
        body { background: var(--bg); color: var(--cream); font-family: 'IM Fell English', serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Pantalla de Intención */
        #pantalla-intencion { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s ease; }
        .opcion-intencion { border: 1px solid var(--gold); padding: 15px 30px; margin: 10px; cursor: pointer; font-family: 'Cinzel', serif; color: var(--gold); transition: 0.3s; }
        .opcion-intencion:hover { background: var(--gold); color: var(--bg); }

        .serpent-wrapper { position: relative; width: 250px; height: 250px; margin: 40px auto; border-radius: 50%; padding: 4px; background: linear-gradient(var(--purple), var(--blood)); animation: rotate 4s linear infinite; mask: radial-gradient(circle, transparent 60%, black 61%); }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .hero { text-align: center; padding: 20px; width: 100%; max-width: 600px; }
        h1 { font-family: 'Cinzel Decorative', cursive; color: var(--gold); font-size: 2.2rem; }
        .card { background: rgba(20, 20, 25, 0.9); border: 1px solid var(--purple); padding: 30px; width: 90%; max-width: 400px; border-radius: 12px; margin-bottom: 20px; }
        .btn-pay { display: block; width: 100%; padding: 16px 0; margin-top: 25px; background: linear-gradient(45deg, var(--blood), var(--purple)); color: var(--cream); font-family: 'Cinzel', serif; text-align: center; text-decoration: none; border-radius: 8px; border: 1px solid var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .copyright-footer { margin-top: auto; padding: 40px 20px; text-align: center; font-family: 'Cinzel', serif; color: #6b7280; font-size: 0.9rem; }
        .solvens-font { font-size: 1.6rem; letter-spacing: 2px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Pantalla de Intención -->
    <div id="pantalla-intencion">
        <h2 style="font-family: 'Cinzel', serif; color: var(--gold); margin-bottom: 30px;">Define tu Intención</h2>
        <div class="opcion-intencion" onclick="seleccionarIntencion('Claridad')">Claridad</div>
        <div class="opcion-intencion" onclick="seleccionarIntencion('Purificación')">Purificación</div>
        <div class="opcion-intencion" onclick="seleccionarIntencion('Evolución')">Evolución</div>
    </div>

    <header class="hero">
        <div class="serpent-wrapper"></div>
        <h1>Essentia Serpentis Arcana</h1>
    </header>

    <div class="card">
        <h3>Evaluación Inicial</h3>
        <p>Intención seleccionada: <strong id="display-intencion" style="color: var(--gold);">Ninguna</strong></p>
        <a id="link-wa" href="#" class="btn-pay" onclick="registrarConvergencia('whatsapp')">Iniciar Pacto (WhatsApp)</a>
        <a href="#ENLACE_DE_PAYPAL_AQUI" class="btn-pay" style="background: linear-gradient(45deg, #003087, #0079C1);" onclick="registrarConvergencia('paypal')">Pago Directo (PayPal)</a>
    </div>

    <footer class="copyright-footer">
        <p>Development by <span class="solvens-font" id="llave-maestra">𝕾𝖔𝖑𝖛𝖊𝖓𝖘 𝕬𝖒𝖔𝖗𝖎𝖘</span></p>
    </footer>

    <script>
        let intencion = "Ninguna";
        function seleccionarIntencion(valor) {
            intencion = valor;
            document.getElementById('display-intencion').innerText = valor;
            document.getElementById('pantalla-intencion').style.opacity = '0';
            setTimeout(() => document.getElementById('pantalla-intencion').style.display = 'none', 1000);
            
            // Actualizar link de WA con la intención
            const baseWa = "https://wa.me/5491158409086?text=%2FINICIAR_PACTO%20Saludos.%20Intenci%C3%B3n:%20";
            document.getElementById('link-wa').href = baseWa + valor + ".%20Deseo%20comenzar%20mi%20Evaluaci%C3%B3n%20Inicial.";
        }

        function registrarConvergencia(origen) {
            console.log("Convergencia: " + origen + " con intención: " + intencion);
        }
    </script>
</body>
</html>
