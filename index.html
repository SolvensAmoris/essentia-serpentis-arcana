<style>
  :root{
    /* Main Theme Variables */
    --void:#050507; --void-2:#0c0c12;
    --amethyst:#4A0E8F; --amethyst-deep:#25073f;
    --sanguine:#5c0f1c;
    --gold:#c9a84c; --gold-soft:rgba(201,168,76,.35); --gold-faint:rgba(201,168,76,.15);
    --parchment:#ede3cc; --parchment-dim:rgba(237,227,204,.78);
    --verdigris:#3e5c50;
    --font-display:'Cinzel Decorative', serif;
    --font-struct:'Cinzel', serif;
    --font-body:'IM Fell English', serif;
    
    /* Modal Variables */
    --ink: #1a1420;
    --ink-2: #241c2c;
  }
  
  *,*::before,*::after{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
  }
  
  body{
    margin:0; background:var(--void); color:var(--parchment); font-family:var(--font-body);
    line-height:1.7; overflow-x:hidden; position:relative;
    background-image:radial-gradient(ellipse 900px 500px at 50% -5%, rgba(74,14,143,.28), transparent 60%);
  }
  a{ color:inherit; }
  a:focus-visible, button:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; }
  img{ max-width:100%; }

  /* ---------- ember particles ---------- */
  .ember-field{ position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .ember-field span{
    position:absolute; bottom:-10px; width:3px; height:3px; border-radius:50%;
    background:var(--gold); opacity:0; box-shadow:0 0 6px 1px var(--gold-soft);
    animation:ember 11s linear infinite;
  }
  @keyframes ember{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    12%{ opacity:.65; }
    88%{ opacity:.15; }
    100%{ transform:translateY(-105vh) translateX(18px); opacity:0; }
  }

  /* ---------- eyebrow / headings ---------- */
  .eyebrow{ font-family:var(--font-struct); text-transform:uppercase; letter-spacing:.28em; font-size:.7rem; color:var(--gold); margin:0 0 .9em; }
  .eyebrow--center{ text-align:center; }
  h1,h2{ font-weight:400; }

  /* ---------- hero ---------- */
  .hero{
    position:relative; z-index:1; min-height:100svh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:9vh 6vw 7vh;
  }
  .hero__ring{ position:relative; width:270px; height:270px; margin-bottom:42px; }
  .hero__ring svg{ position:absolute; inset:0; width:100%; height:100%; animation:breathe 6s ease-in-out infinite; }
  @keyframes breathe{
    0%,100%{ filter:drop-shadow(0 0 5px var(--gold-soft)); }
    50%{ filter:drop-shadow(0 0 15px var(--gold-soft)); }
  }
  .hero__cover{
    position:absolute; inset:18px; border-radius:50%; overflow:hidden;
    background:radial-gradient(circle at 35% 30%, var(--amethyst-deep), var(--void) 75%);
  }
  .hero__cover img{ width:100%; height:100%; object-fit:cover; display:block; }
  .hero__badge{
    position:absolute; width:92px; height:92px; left:50%; bottom:-14px; transform:translateX(-50%);
    border-radius:50%; overflow:hidden; border:3px solid var(--void);
    box-shadow:0 0 0 1px var(--gold), 0 8px 20px rgba(0,0,0,.55);
    background:radial-gradient(circle at 35% 30%, var(--amethyst-deep), var(--void) 75%);
  }
  .hero__badge img{ width:100%; height:100%; object-fit:cover; display:block; transition:opacity .5s ease; }
  .hero__seal{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .hero__seal span{ font-family:var(--font-struct); letter-spacing:.14em; font-size:.5rem; color:var(--gold); opacity:.9; padding-left:.14em; }

  h1{ font-family:var(--font-display); font-size:clamp(2.1rem,6.5vw,3.4rem); color:var(--parchment); margin:.15em 0 .45em; text-shadow:0 0 26px rgba(201,168,76,.22); }
  .hero__tag{ max-width:32ch; margin:0 auto 2.3em; font-style:italic; color:var(--parchment-dim); font-size:1.05rem; }
  .hero__scroll{ font-family:var(--font-struct); font-size:.76rem; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--gold); border-bottom:1px solid var(--gold-soft); padding-bottom:5px; }

  /* ---------- divider ---------- */
  .divider{ height:1px; width:120px; margin:0 auto; background:linear-gradient(90deg,transparent,var(--gold),transparent); opacity:.7; }

  /* ---------- reveal ---------- */
  .reveal{ opacity:0; transform:translateY(26px); transition:opacity .9s ease, transform .9s ease; }
  .reveal.is-visible{ opacity:1; transform:none; }

  /* ---------- umbral ---------- */
  .umbral{ position:relative; z-index:1; padding:11vh 6vw 9vh; }
  .umbral__inner{ max-width:620px; margin:0 auto; }
  .umbral__lead{ font-size:1.16rem; color:rgba(237,227,204,.94); }
  .dropcap{ font-family:var(--font-display); font-size:3.3rem; line-height:.75; float:left; padding:.06em .1em 0 0; color:var(--gold); }
  .umbral__quote{
    margin:2.3em auto 0; max-width:30ch; text-align:center; font-style:italic; font-size:1.22rem;
    color:var(--parchment); border-top:1px solid var(--gold-faint); border-bottom:1px solid var(--gold-faint); padding:1.5em 0;
  }

  /* ---------- arcanos ---------- */
  .arcanos{ position:relative; z-index:1; padding:9vh 6vw 10vh; text-align:center; }
  .arcanos h2, .proceso h2{ font-family:var(--font-display); font-size:clamp(1.5rem,4vw,2.1rem); color:var(--parchment); margin:.2em 0 1.5em; }
  .arcanos__grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:22px; max-width:1000px; margin:0 auto; text-align:left; }
  .arcano-card{
    background:linear-gradient(160deg, rgba(74,14,143,.16), rgba(5,5,7,.45));
    border:1px solid rgba(201,168,76,.35); border-radius:14px; padding:30px 26px;
    position:relative; transition:transform .35s ease, border-color .35s ease, box-shadow .35s ease;
  }
  .arcano-card::before{ content:""; position:absolute; inset:7px; border:1px solid var(--gold-faint); border-radius:9px; pointer-events:none; }
  .arcano-card:hover{ transform:translateY(-6px); border-color:var(--gold); box-shadow:0 14px 32px rgba(0,0,0,.4); }
  .arcano-card svg{ width:34px; height:34px; color:var(--gold); margin-bottom:16px; }
  .arcano-card h3{ font-family:var(--font-struct); font-size:1.02rem; letter-spacing:.03em; color:var(--gold); margin:0 0 .55em; font-weight:500; }
  .arcano-card p{ margin:0; font-size:.97rem; color:var(--parchment-dim); }

  /* ---------- proceso ---------- */
  .proceso{ position:relative; z-index:1; padding:4vh 6vw 10vh; text-align:center; }
  .proceso__list{ list-style:none; margin:0 auto; padding:0; max-width:540px; text-align:left; position:relative; }
  .proceso__list::before{ content:""; position:absolute; left:23px; top:6px; bottom:6px; width:1px; background:linear-gradient(var(--gold-soft), transparent 92%); }
  .proceso__step{ display:flex; gap:20px; padding:0 0 34px; position:relative; }
  .proceso__step:last-child{ padding-bottom:0; }
  .proceso__num{
    flex:none; width:46px; height:46px; border-radius:50%; border:1px solid var(--gold);
    display:flex; align-items:center; justify-content:center; font-family:var(--font-struct);
    color:var(--gold); font-size:.92rem; background:var(--void); position:relative; z-index:1;
  }
  .proceso__step h3{ margin:.15em 0 .3em; font-family:var(--font-struct); font-size:1rem; color:var(--parchment); font-weight:500; }
  .proceso__step p{ margin:0; font-size:.95rem; color:var(--parchment-dim); }

  /* ---------- pacto (Call to Action) ---------- */
  .pacto{ position:relative; z-index:1; padding:4vh 6vw 13vh; display:flex; justify-content:center; }
  .pacto__card{
    width:100%; max-width:420px; text-align:center; padding:44px 32px; position:relative;
    background:rgba(15,15,20,.75); border:1px solid var(--amethyst); border-radius:14px;
    box-shadow:0 0 44px rgba(74,14,143,.2);
  }
  .pacto__card::before{ content:""; position:absolute; inset:7px; border:1px solid var(--gold-faint); border-radius:9px; pointer-events:none; }
  .pacto__card h2{ font-family:var(--font-display); color:var(--gold); font-size:1.6rem; margin:.1em 0 .55em; }
  .pacto__card > p{ color:var(--parchment-dim); margin:0 0 1.7em; }
  .pacto__btn{
    display:block; width:100%; padding:17px 0; font-family:var(--font-struct);
    text-transform:uppercase; letter-spacing:.14em; font-size:.84rem; text-decoration:none;
    border-radius:4px; transition:transform .25s ease, box-shadow .25s ease; cursor:pointer;
  }
  .pacto__btn--primary{ background:linear-gradient(45deg, var(--sanguine), var(--amethyst)); color:var(--parchment); border:1px solid var(--gold); }
  .pacto__btn--primary:hover{ transform:translateY(-2px); box-shadow:0 10px 24px rgba(0,0,0,.45); }

  /* ---------- footer ---------- */
  .site-footer{ position:relative; z-index:1; padding:40px 20px 56px; text-align:center; font-family:var(--font-struct); color:#6b7280; font-size:.85rem; }
  .solvens-font{ cursor:pointer; color:var(--parchment); font-size:1.5rem; letter-spacing:.12em; }

  /* ---------- Modal Styles ---------- */
  .modal-overlay{
    position:fixed; inset:0; background: rgba(10,8,14,.85);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition: opacity .25s ease;
    padding: 20px; z-index: 999;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }
  .modal-overlay.open{ opacity:1; pointer-events:auto; }

  .modal{
    width: 100%; max-width: 420px;
    background: linear-gradient(180deg, var(--ink-2), var(--ink));
    border: 1px solid rgba(201,168,76,.35);
    border-radius: 6px;
    padding: 32px 28px 28px;
    position: relative;
    transform: scale(.96) translateY(8px);
    transition: transform .25s ease;
  }
  .modal-overlay.open .modal{ transform: scale(1) translateY(0); }

  .modal-close{
    position:absolute; top:14px; right:16px;
    background:none; border:none; color: var(--parchment);
    font-size: 22px; opacity:.6; cursor:pointer; line-height:1;
  }
  .modal-close:hover{ opacity:1; }

  .modal-title{
    font-family: var(--font-display);
    font-size: 28px; letter-spacing:.03em; margin: 0 0 8px;
    color: var(--parchment);
  }
  .modal-sub{
    font-size: 14px; line-height:1.5; opacity:.78; margin: 0 0 20px;
  }
  .modal-sub strong{ color: var(--gold); font-weight:600; }

  .sigil-divider{
    display:flex; align-items:center; gap:10px; margin: 4px 0 22px;
    color: var(--gold); opacity:.7;
  }
  .sigil-divider::before, .sigil-divider::after{
    content:""; flex:1; height:1px; background: currentColor; opacity:.5;
  }
  .sigil-divider span{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; }

  .pay-btn{
    display:block; text-align:center; text-decoration:none;
    font-family: 'Inter', system-ui, sans-serif; font-weight:600; font-size:15px;
    background: linear-gradient(180deg, var(--gold), #a5813a);
    color: var(--void); border-radius: 4px; padding: 13px 0; cursor:pointer;
  }
  .pay-btn:hover{ filter: brightness(1.06); }

  .confirm-btn{
    display:block; width:100%; margin-top:10px;
    font-family: 'Inter', system-ui, sans-serif; font-size:14px;
    background: transparent; color: var(--parchment);
    border: 1px solid rgba(237,227,204,.35); border-radius:4px;
    padding: 11px 0; cursor:pointer; opacity:.6; pointer-events:none;
    transition: opacity .2s ease;
  }
  .confirm-btn.active{ opacity:1; pointer-events:auto; border-color: var(--gold); }
  .confirm-btn:hover.active{ background: rgba(201,168,76,.1); }

  .status-line{
    margin-top: 14px; font-size: 13px; text-align:center; min-height: 18px;
  }
  .status-line.ok{ color: #8fd6a8; }
  .status-line.err{ color: #e08a8a; }

  @media (max-width:480px){
    .hero__ring{ width:225px; height:225px; }
    .hero__cover{ inset:16px; }
    .hero__badge{ width:78px; height:78px; }
  }
</style>
</head>
